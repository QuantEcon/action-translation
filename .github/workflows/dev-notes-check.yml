name: dev-notes check

# Deterministic pass-1 health check for the .dev/ notes convention.
# Blocks on schema errors; staleness/size/signal findings are advisory (warnings).
# Runs only when .dev/ changes, plus a weekly staleness sweep and manual dispatch.

on:
  pull_request:
    paths: ['.dev/**']
  schedule:
    - cron: '0 9 * * 1' # Mondays 09:00 UTC — catches stale `verified` / unresolved promote items
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate .dev/ notes
        run: node .dev/tools/check.mjs
