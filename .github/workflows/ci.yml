name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['.dev/**']
  pull_request:
    branches: [main]
    # Note: if `test` ever becomes a *required* status check, drop this ignore —
    # a skipped required check never reports and would deadlock .dev-only PRs.
    paths-ignore: ['.dev/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify dist-action bundle is up to date
        run: |
          if [ -n "$(git status --porcelain dist-action)" ]; then
            echo "::error::dist-action/ is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff -- dist-action
            exit 1
          fi
